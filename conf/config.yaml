# 実験するたびにここを変更しない。基本はスクリプトから変更する。
# python main.py --overrides exp_dir=results/test2 model.unet.start_ch=32
# 上記のように--overridesの後に変更したい変数を書くことで設定を変更できる
exp_dir: results/test

data_dir: datasets_i2i
num_train_steps: 100000 # optimizer更新回数（micro batch数ではない）
eval_every: 1000 # optimizer更新回数単位のvalidation/checkpoint間隔
# 0で無制限。同一時間予算でアルゴリズム比較するときに使用する
max_train_minutes: 0
num_workers: 12
batch_size: 16
# 1回のoptimizer更新に使うmicro batch数。実効batch size=batch_size×この値。
# num_train_steps/eval_everyは従来どおりoptimizer更新回数として扱う。
gradient_accumulation_steps: 1
prefetch_size: 2

reproducibility:
  seed: 0
  # GPU演算の完全決定性。速度低下や未対応演算があり得るため必要な比較実験で有効化する
  deterministic_ops: False
  # 生成系の検証・推論で症例ID由来の固定初期ノイズを使う
  fixed_validation_noise: True

evaluation:
  # 3D画像を各方向の2Dスライスとして評価し、症例ごとに平均する
  ssim_axes: [z,y,x]
  min_slice_mask_coverage: 0.1
  # 検証時に各症例のz方向を等間隔に評価する固定パッチ数
  val_patches_per_volume: 3
  # 空文字で無効、memoryでRAM、その他はtf.data cacheファイルのパス
  validation_cache: ""

inference:
  sliding_window: true
  # nullの場合はaug.crop_size_zyxを使う
  patch_size_zyx: null
  overlap: 0.5
  batch_size: 1

debug_time: False
debug_train_val: False
debug_dataloader: False # debug_dataloader.pyで設定されるので触る必要はない
gpu: 0
gpu_allow_growth: False
enable_profiling: False
# float32 / mixed_float16 / mixed_bfloat16。3D学習ではmixed_float16で省メモリ・高速化
mixed_precision_policy: float32

restore: "" # 実験を再開する場合はここにチェックポイントのパスを指定
finetune: "" # 事前学習済みモデルを指定する場合はここにパスを指定

# generatorの重みの指数移動平均。拡散/フロー系(edm/rectified_flow/i2i_rfr)で特に有効。
# 有効時は検証・チェックポイントがEMA重みになる（restoreの厳密再開は不可になる）
ema:
  enabled: False
  decay: 0.999

data:
  # paired: source(xxx.hdr) と target(xxx.target.hdr) を同一フォルダから読む
  # paired_dir: source(data_dir) と target(target_data_dir) を別フォルダの同名ファイルで対応
  # denoise: クリーン画像1枚から source=クリーン+合成ノイズ / target=クリーン を作る
  #          （self_noiseは後方互換の別名。targetファイル不要）
  # self_sr: クリーン画像1枚から source=スライス方向低解像度シミュレーション / target=クリーン
  #          を作る（through-plane SRの自己教師学習。targetファイル不要）
  mode: paired
  # pairedモード: sourceが xxx.hdr のとき target は xxx.target.hdr
  target_suffix: ".target"
  # paired_dirモード: targetのルートフォルダ（data_dir配下と同じ {split}/{dataset}/{同名} 構造）
  target_data_dir: ""
  # MRI contrastをcleanへ先に適用し、その後にdenoise/SR劣化を生成する。
  # pairedではsource/targetへ同じ変換を共有するため位置対応を壊さない。
  contrast_augmentation:
    enabled: False
    p_apply: 0.7
    percentile_range: [1.0, 99.0]
    gamma_range: [0.75, 1.35]
    scale_range: [0.85, 1.20]
    shift_range: [-0.08, 0.08]
    invert_prob: 0.0
    bias_field_prob: 0.25
    bias_field_scale_range: [0.90, 1.10]
    bias_field_sigma_range: [16.0, 64.0]
  self_noise:
    # gaussian（従来動作）/ rician / kspace / lowfield
    simulation: gaussian
    # 劣化はぼかし→ノイズの順に適用する
    # ノイズ量は強度レンジ(正規化のmin-max)に対する相対値で指定する
    noise_std_rel_range: [0.05, 0.15] # 学習時はこの範囲でランダム
    val_noise_std_rel: 0.1 # 検証時は固定（ファイル名でシード固定し再現性を確保）
    # ぼかし（ガウシアン、sigmaはvoxel単位）。blur_prob=0で無効
    blur_prob: 0.0 # 学習時にぼかしを適用する確率
    blur_sigma_range: [0.5, 1.5] # 学習時のsigma範囲
    val_blur_sigma: 0.0 # 検証時の固定sigma（0でぼかし無し）
    # 手ブレ様のモーションブラー（ランダム3D方向の直線PSF、長さはvoxel単位）
    # 方向の曖昧さにより正解候補が多峰的になる（生成系との比較実験向き）
    motion_blur:
      prob: 0.0 # 学習時に適用する確率。0で無効
      length_range: [3.0, 9.0] # 学習時のブレ長さ範囲
      val_length: 0.0 # 検証時の固定長さ（0で無効。方向はファイル毎にシード固定）
    rician:
      # Rician noise成分をXY方向に相関させ、粗いnoise grainを再現する
      grain_sigma_range: [0.0, 2.0]
      val_grain_sigma: 1.0
    kspace:
      # 除去する高周波k-spaceの割合（slice-wise 2D FFT）
      resolution_reduction_range: [0.0, 0.3]
      val_resolution_reduction: 0.15
    lowfield:
      # profileを先に選ぶことでSNR/解像度/noise相関/帯域の現実的な組を保つ
      profiles:
        - name: T2
          weight: 1.0
          target_snr: [4.5, 5.5]
          downsample: [0.25, 0.35]
          noise_corr_mm: [1.2, 1.8]
          kspace_keep: [0.25, 0.35]
        - name: T1
          weight: 1.0
          target_snr: [13.0, 17.0]
          downsample: [0.45, 0.55]
          noise_corr_mm: [1.2, 1.8]
          kspace_keep: [0.25, 0.35]
        - name: FLAIR
          weight: 1.0
          target_snr: [7.0, 9.0]
          downsample: [0.40, 0.50]
          noise_corr_mm: [1.2, 1.8]
          kspace_keep: [0.25, 0.35]
      # profilesを空にした場合の独立range fallback
      target_snr_min: 5.0
      target_snr_max: 15.0
      downsample_min: 0.5
      downsample_max: 1.0
      noise_corr_mm_max: 2.0
      kspace_keep_min: 0.2
      kspace_keep_max: 1.0
      val_profile: T2
  # through-plane SR (data.mode=self_sr のときに使用)
  # 劣化は「スライスプロファイルぼかし→スライス間隔でダウンサンプリング→元グリッドへ補間」の順
  # （edm-torchのThroughPlaneSuperResolution physicalモード相当）
  # 間隔・厚みのpx換算はアフィン変換後のスペーシング(aug.affine.norm_spacing_zyx)基準
  self_sr:
    axes: [AX] # 学習時に劣化させる軸をここからランダム選択（AX=z / COR=y / SAG=x）
    # 空でなければaxes/rangeより優先。axis/interval/thickness/weightを撮像条件ごとに指定する
    protocols: []
    slice_interval_mm_range: [2.0, 6.0] # 撮像スライス間隔[mm]（学習時はこの範囲でランダム）
    slice_thickness_mm_range: [1.0, 6.0] # スライス厚[mm]（学習時はこの範囲でランダム）
    clamp_thickness_to_interval: true # スライス厚を間隔以下に制限する
    slice_profile: gaussian # gaussian(FWHM=スライス厚) / box(幅=スライス厚) / continuous(σ=k*スライス間隔) / none
    continuous_sigma_k: 0.32 # slice_profile=continuous時のk
    slice_interpolation: linear # linear / spline / b-spline（b-splineはscipy.zoom prefilter=False）
    b_spline_order: 3 # slice_interpolation=b-spline時のscipy.zoom order（0〜5）
    acquisition_order: 1 # PSF適用後の低解像度スライス位置での標本化。0=nearest / 1=linear
    random_slice_phase: true # 学習時に低解像度スライス中心の開始位置をランダム化
    val_slice_phase_px: 0 # 検証時の固定開始位置（正規化後グリッドのvoxel単位）
    val_axis: AX # 検証時の固定軸
    val_slice_interval_mm: 4.0 # 検証時の固定スライス間隔[mm]
    val_slice_thickness_mm: 4.0 # 検証時の固定スライス厚[mm]
  # 実劣化データのdata consistency損失（self_sr向け半教師あり学習）
  # 正解のない実劣化画像に対する予測を微分可能な劣化演算子（軸方向ガウシアン近似）
  # で再劣化し、入力自身と比較する。sim2realギャップの縮小に使う。
  # 対応アルゴリズム: regression / pix2pix / rectified_flow / i2i_rfr /
  #                   i2i_rfr_x0 / resshift / split_mean_flow（edmは非対応）
  real_dc:
    enabled: False
    input_dir: "" # 実劣化画像(.hdr/.raw)のフォルダ（正解不要。probe/testと同じ形式）
    weight: 0.05 # DC損失の重み
    warmup_steps: 2000 # 重みを線形に立ち上げるステップ数（主損失の学習が先）
    axis: AX # 実データの厚肉軸（AX=z / COR=y / SAG=x。固定。ヘッダで確認して指定）
    slice_interval_mm: null # nullでヘッダの厚肉軸スペーシングを使う
    # 注意: スキャナ側で薄スライスへ補間済みのデータはヘッダが実効間隔を
    # 反映しないため、撮像プロトコルの値を明示的に指定すること
    slice_thickness_mm: null # nullでslice_interval_mmと同値
    # 「間引き→補間」の実効平滑化をσ=factor*間隔px のガウシアンで近似する係数
    # （劣化全体を σ=sqrt(σ_profile^2+σ_interp^2) の軸方向ぼかしで表す）
    interp_sigma_factor: 0.35
    loss: l1 # l1 or mse

# 画像変換アルゴリズムの選択と設定
# 比較実験は --overrides algorithm.name=pix2pix exp_dir=results/pix2pix のように行う
algorithm:
  name: regression # regression / pix2pix / edm_karras / conditional_restoration_ode / rectified_flow / i2i_rfr / i2i_rfr_x0 / resshift / split_mean_flow
  regression:
    # residual: pred = source + logits (デノイズ・ぼかし修正におすすめ)
    # direct: pred = sigmoid(logits)
    output_mode: residual
    loss:
      l1: 1.0 # 0.0で無効化
      l2: 0.0 # 0.0で無効化
      ssim: 0.0 # 0.0で無効化 (1 - SSIMを損失として加える)
  pix2pix:
    output_mode: residual # regressionと同じ意味
    gan_mode: lsgan # lsgan(推奨) or vanilla
    l1_weight: 100.0 # pix2pix論文のデフォルト
    gan_weight: 1.0
    discriminator:
      base_ch: 16
      num_layers: 3 # ストライド2の畳み込みの数（受容野の大きさが変わる）
    d_optimizer: # discriminator用（generatorはoptimizerセクションの設定を使う）
      lr: 2e-4
      beta_1: 0.5
      clip_value: 10
  # 後方互換名。新規実験では同じ実装を明示するedm_karrasを推奨。
  edm: # optimizerはadamw(max_lr 1e-4～2e-4)を推奨
    sigma_data: 0.5 # 画像を[-1,1]で扱うので0.5固定を推奨
    P_mean: -1.2 # 学習時のσサンプリング(log-normal)の平均
    P_std: 1.2 # 同標準偏差
    sigma_min: 0.002
    sigma_max: 80.0
    rho: 7.0 # Karrasスケジュールの歪み係数
    num_steps: 20 # 推論時のサンプリングステップ数(ネットワーク評価はheun:2N-1回 / euler:N回)
    num_steps_val: 8 # 検証時のステップ数（val_psnr計算用。小さめにして高速化）
    solver: heun # heun(2次・推奨) or euler(1次・評価回数半分)
  edm_karras: # Karras et al. 2022のEDM preconditioning + rho schedule
    sigma_data: 0.5
    P_mean: -1.2
    P_std: 1.2
    sigma_min: 0.002
    sigma_max: 80.0
    rho: 7.0
    num_steps: 20
    num_steps_val: 8
    solver: heun
  conditional_restoration_ode: # PyTorch版の従来edm目的関数を明示名で移植
    P_mean: -0.5 # truncated Gaussianでサンプルするlog(sigma)の平均
    P_std: 2.0
    sigma_min: 0.002
    sigma_max: 80.0
    degradation_eps: 0.01 # source-target差が小さい症例のloss分母を安定化
    num_steps: 35 # log-linear sigma schedule
    num_steps_val: 5
    solver: heun # heun or euler
  rectified_flow: # optimizerはadamw(max_lr 1e-4～2e-4)を推奨
    num_steps: 20 # 推論時の積分ステップ数(ネットワーク評価はeuler:N回 / heun:2N回)
    num_steps_val: 8 # 検証時のステップ数（val_psnr計算用）
    time_sampling: uniform # uniform or logit_normal(中間時刻を重視。SD3方式)
    logit_normal_mean: 0.0
    logit_normal_std: 1.0
    solver: euler # euler(1次) or heun(2次・同じ精度を少ないステップ数で狙える)
  i2i_rfr: # source→targetを直接結ぶrectified flow。少ステップで動くのが利点
    num_steps: 4 # 推論時の積分ステップ数（1でも可）
    num_steps_val: 2 # 検証時のステップ数
    noise_std: 0.1 # 出発点x0=source+noise_std*εのノイズ量([-1,1]基準。0で決定的)
    time_sampling: uniform
    logit_normal_mean: 0.0
    logit_normal_std: 1.0
    solver: euler # euler(1次) or heun(2次)
  i2i_rfr_x0: # edm-torch版i2i_rfr相当。ノイズ→targetのフローをx0直接予測で学習する
    num_steps: 3 # 推論時の積分ステップ数（元実装は3を常用）
    num_steps_val: 3 # 検証時のステップ数
    loss: l1 # l1 or mse
    p: 1.0 # 時刻tを密度∝t^pでサンプリングし、損失をt^-pで重み付けする
    t_min: 0.001 # t=0の特異点回避（学習時のtの下限、推論時の速度計算にも使用）
    time_condition: zero # zero(時刻を与えない・元実装デフォルト) / t / one_minus_t
    solver: euler # euler(1次・元実装と同じ) or heun(2次・最終ステップのみ1次)
  resshift: # ResShift (Yue et al. 2023): source-target残差をシフトする少ステップ拡散
    num_steps: 15 # ηスケジュール長T（学習・推論共通。論文は15）
    num_steps_val: 15 # 検証時のチェーンステップ数
    kappa: 2.0 # 前向き過程のノイズ強度κ（[-1,1]の作業空間基準）
    schedule_p: 0.3 # sqrt(η)の幾何級数スケジュールの成長率
    loss: mse # mse or l1
    # eta(連続値・推奨) / sqrt_eta / t(インデックス基準。ステップ数変更と相性が悪い)
    time_condition: eta
    sample_noise: false # trueで確率的サンプリング。メトリクス評価はfalse(決定的)を推奨
  split_mean_flow: # SplitMeanFlow: 平均速度場u(x_t,t,s)をJVPなしで学習する1〜数ステップ生成
    num_steps: 1 # 推論時のジャンプ回数（1ステップ生成が主目的。増やすことも可）
    num_steps_val: 1 # 検証時のステップ数
    # 境界条件(s=t、通常のflow matching)として学習するサンプルの割合。
    # 残りは区間分割整合性で学習する。学習初期はflow matchingが支配的な方が
    # 安定するため、収束が悪い場合は大きめ(0.75など)から試す
    fm_ratio: 0.5

model:
  name: unet
  num_channel: 1 # グレースケール出力なので1固定
  unet:
    start_ch: 8
    depth: 4
    num_encode_blocks: 2
    num_decode_blocks: 1
    # スライス方向(z)の畳み込み量の切替（edm-torchのmode相当）
    # 3d: 全レベル3x3x3畳み込み+2x2x2プーリング（従来動作。crop zは2^depthの倍数）
    # mixed: 最上位レベルのみ3D、深層は面内(1x3x3)畳み込み+xyのみプーリング
    #        （zの畳み込み・縮小は最上位の1回だけ。crop zは2の倍数でよい）
    # 2d: 全レベル面内畳み込み。z方向の畳み込み・縮小なし（スライス独立処理）
    mode: 3d
  # 通常のbatch normを使う場合はr_maxを1、d_maxを0としてください
  renorm:
    r_max: 3.0 # 1 for batch norm
    d_max: 5.0 # 0 for batch norm
    warmup_steps: 5000
    change_d_steps: 25000
    change_r_steps: 40000

optimizer:
  name: sgd
  sgd:
    warmup_lr: 1e-4
    max_lr: 0.1
    warmup_ratio: 0.3
    wd: 1e-6
    momentum: 0.9
    use_nesterov: True
    clip_value: 10
  adamw:
    warmup_lr: 1e-5
    max_lr: 1e-3
    warmup_ratio: 0.3
    wd: 1e-4
    clip_value: 10

aug:
  crop_size_zyx: [128,128,128]
  thick2thin_rate_zyx: [0.0,0.0,0.0] # sourceのみ疑似thick化する。I2Iではデフォルト無効
  # アフィン変換(回転・リサンプル)での画像の補間次数。scipy.ndimage.affine_transformのorder。
  # 1=linear（従来。回転で面内高周波が2割落ちる）/ 3=cubic（推奨。喪失6%で鮮鋭さ保持）
  # マスクは常に最近傍(order=0)。0〜5で指定可
  image_interpolation_order: 3

  affine:
    norm_spacing_zyx: [1.0,1.0,1.0]
    random_rot_deg_zyx: [180,180,180] # +-180度の範囲で回転
    random_flip_axis_zyx: [False,False,True] #x=左右反転
    random_scaling_range_zyx: [[0.15,0.15],[0.15,0.15],[0.15, 0.15]]
    random_shift_rate_zyx: [0.,0.,0.] # 回転中心をランダムに選ぶのでここは０にした

  # 以下の強度系のデータ拡張はsourceのみに適用される（targetは常に決定的に正規化）
  # デノイズ・ぼかし修正では劣化過程そのものを変えてしまうため、デフォルトは無効
  random_sharpness:
    prob: 0.0
    sigma: 3.0
    alpha_range: [0.,2.]
  random_gauss_filter:
    prob: 0.0
    sigma_range: [0.5,2.0]
  random_gauss_noise:
    prob: 0.0
    stddev_range: [0.0,0.05]
  random_normalize:
    prob: 0.0 # sourceとtargetの正規化が食い違うので基本は無効を推奨
    random_center_deviation: 0.5
    random_range_deviation: 0.1
  random_gamma_correction:
    prob: 0.0
    random_gamma_range: [1.0,1.0] # 1.0-1.0で無効化

  # ランダムクロップの中心を決める方法（検証時は画像中心を使う）
  # 学習時のみ、元画像z方向の先頭nスライスをランダムcrop候補から外す
  crop_exclude_start_slices: 0
  # body: 体表マスク(.body.mask.hdr)の矩形内でクロップ / image: 画像全体からクロップ
  random_crop_method:
    body: 0.0
    image: 1.0

image:
  modality: CT # CT or MR　画像の正規化方法を変えます
  # TensorBoardの画像ロギング断面。z/y/xまたはAX/COR/SAGを複数指定できる
  # （z=AX、y=COR、x=SAG。文字列1つでも動く）
  log_axis: [AX, COR, SAG]
  # Trueの場合、targetの正規化にsourceと同じmin/maxを使う
  # デノイズ・ぼかし修正のような同一モダリティ変換ではTrueを推奨
  share_normalization: True
  CT:
    window_level: 60 # HU
    window_width: 600 # HU
  MR:
    min_percentile: 5 # %
    max_percentile: 95 # %

# 正解なしテスト入力の推論ログ（学習中にTensorBoardへ記録する）
# 入力は検証時と同じ前処理（中心クロップ + norm_spacing_zyxへの補間リサンプル）
# を通るため、スライス方向に解像度が低い実データ（self_srのテスト等）は
# ここで等方グリッドへ補間されてからモデルに入る
test:
  enabled: False
  input_dir: "" # 正解なしの入力画像(.hdr/.raw)を置いたフォルダ
  max_items: 4 # 記録する最大症例数（0以下で全件。名前順の先頭から使う）
